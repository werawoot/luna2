<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HookView — Inspector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #1e2130;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; }
    #endpointUrl {
      font-size: 0.8rem;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 6px 10px;
      color: #a5b4fc;
      font-family: monospace;
      flex: 1;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #copyBtn {
      padding: 6px 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #copyBtn:hover { background: #4f46e5; }
    #wsStatus {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 99px;
      background: #374151;
      color: #9ca3af;
    }
    #wsStatus.connected { background: #064e3b; color: #6ee7b7; }

    /* Main layout */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Request list */
    #requestList {
      width: 300px;
      flex-shrink: 0;
      overflow-y: auto;
      border-right: 1px solid #2d3148;
    }
    #requestList .empty {
      padding: 24px 16px;
      color: #4b5563;
      font-size: 0.85rem;
      text-align: center;
    }
    .req-item {
      padding: 12px 16px;
      border-bottom: 1px solid #1e2130;
      cursor: pointer;
      transition: background 0.1s;
    }
    .req-item:hover { background: #1e2130; }
    .req-item.active { background: #1e2130; border-left: 3px solid #6366f1; }
    .req-item .method {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .method-GET    { background: #1d4ed8; color: #bfdbfe; }
    .method-POST   { background: #065f46; color: #a7f3d0; }
    .method-PUT    { background: #92400e; color: #fde68a; }
    .method-DELETE { background: #7f1d1d; color: #fca5a5; }
    .method-PATCH  { background: #4c1d95; color: #ddd6fe; }
    .method-OTHER  { background: #374151; color: #e5e7eb; }
    .req-item .path {
      font-size: 0.82rem;
      color: #cbd5e1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .req-item .time {
      font-size: 0.72rem;
      color: #4b5563;
      margin-top: 2px;
    }

    /* Detail pane */
    #detail {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #detail .placeholder {
      color: #374151;
      font-size: 0.9rem;
      margin: auto;
      text-align: center;
    }
    .section { display: flex; flex-direction: column; gap: 8px; }
    .section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
    }
    pre {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.8rem;
      font-family: 'Menlo', 'Monaco', monospace;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a5b4fc;
    }
  </style>
</head>
<body>
  <header>
    <h1>🪝 HookView</h1>
    <input id="endpointUrl" readonly title="Click to copy" />
    <button id="copyBtn">Copy URL</button>
    <span id="wsStatus">Connecting…</span>
  </header>
  <main>
    <div id="requestList"><div class="empty">Waiting for requests…</div></div>
    <div id="detail"><div class="placeholder">Select a request to inspect</div></div>
  </main>
  <script src="/js/inspect.js"></script>
</body>
</html>
